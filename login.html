<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeetingTracker — Sign in</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1a1a1a;-webkit-font-smoothing:antialiased}
.card{background:#fff;border:1px solid #e8e7e3;border-radius:12px;padding:40px 36px;width:100%;max-width:400px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-mark{width:32px;height:32px;background:#1a1a1a;border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:18px;height:18px}
.logo-name{font-size:16px;font-weight:600;letter-spacing:-.3px}
h1{font-size:20px;font-weight:600;letter-spacing:-.3px;margin-bottom:6px}
p{font-size:13.5px;color:#6b6b6b;margin-bottom:28px;line-height:1.5}
.btn{width:100%;padding:10px 16px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .12s;border:1px solid #e8e7e3;background:#fff;color:#1a1a1a;margin-bottom:10px}
.btn:hover{background:#f7f7f5;border-color:#d6d5cf}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;font-size:12px;color:#ababab}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e8e7e3}
.input{width:100%;padding:10px 12px;border:1px solid #e8e7e3;border-radius:8px;font-size:14px;color:#1a1a1a;outline:none;transition:border-color .15s;font-family:inherit;margin-bottom:10px}
.input:focus{border-color:#2f6fed;box-shadow:0 0 0 3px rgba(47,111,237,.08)}
.btn-primary{background:#2f6fed;color:#fff;border-color:#2f6fed}
.btn-primary:hover{background:#1a5fd4;border-color:#1a5fd4}
.msg{font-size:13px;text-align:center;min-height:20px;margin-top:4px}
.msg.success{color:#2d9e6e}
.msg.error{color:#d44c47}
.ms-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:16px;height:16px;flex-shrink:0}
.ms-grid div{border-radius:1px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20" fill="none">
        <rect x="2" y="2" width="6" height="6" rx="1.5" fill="white" opacity=".95"/>
        <rect x="12" y="2" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
        <rect x="2" y="12" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
        <rect x="12" y="12" width="6" height="6" rx="1.5" fill="white" opacity=".28"/>
      </svg>
    </div>
    <span class="logo-name">MeetingTracker</span>
  </div>
  <h1>Sign in</h1>
  <p>Betty is ready when you are.</p>
  <button class="btn" onclick="signInMicrosoft()">
    <div class="ms-grid">
      <div style="background:#f25022"></div>
      <div style="background:#7fba00"></div>
      <div style="background:#00a4ef"></div>
      <div style="background:#ffb900"></div>
    </div>
    Continue with Microsoft
  </button>
  <div class="divider">or</div>
  <input class="input" type="email" id="emailInput" placeholder="you@company.com" onkeydown="if(event.key==='Enter')sendMagicLink()">
  <button class="btn btn-primary" onclick="sendMagicLink()">Send magic link</button>
  <div class="msg" id="msg"></div>
</div>
<script>
var BACKEND='https://meetingtracker-backend-production.up.railway.app';
function signInMicrosoft(){window.location.href=BACKEND+'/auth/microsoft';}
function sendMagicLink(){
  var email=document.getElementById('emailInput').value.trim();
  var msg=document.getElementById('msg');
  if(!email){msg.className='msg error';msg.textContent='Please enter your email.';return;}
  msg.className='msg';msg.textContent='Sending...';
  fetch(BACKEND+'/api/auth/magic',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.message){msg.className='msg success';msg.textContent='Magic link sent — check your email.';}
    else{msg.className='msg error';msg.textContent=d.error||'Something went wrong.';}
  })
  .catch(function(){msg.className='msg error';msg.textContent='Could not reach the server.';});
}
</script>
</body>
</html>
