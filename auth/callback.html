<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signing you in...</title>
<style>
body{font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f7f7f5;color:#1a1a1a}
.box{text-align:center}
.spinner{width:28px;height:28px;border:2px solid #e8e7e3;border-top-color:#2f6fed;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
p{font-size:14px;color:#6b6b6b}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p id="msg">Signing you in...</p>
</div>
<script>
var BACKEND = 'https://meetingtracker-backend-production.up.railway.app';

function getParams(str) {
  var params = {};
  str.replace(/^\?|^#/,'').split('&').forEach(function(part) {
    var item = part.split('=');
    if(item[0]) params[decodeURIComponent(item[0])] = decodeURIComponent(item[1]||'');
  });
  return params;
}

var hashParams  = getParams(window.location.hash);
var queryParams = getParams(window.location.search);
var params = Object.assign({}, queryParams, hashParams);

var accessToken  = params['access_token'];
var refreshToken = params['refresh_token'];
var errorDesc    = params['error_description'] || params['error'];

if(accessToken) {
  localStorage.setItem('mt_access_token', accessToken);
  localStorage.setItem('mt_refresh_token', refreshToken || '');
  document.getElementById('msg').textContent = 'Setting up your workspace...';

  // Call session endpoint to get/create workspace
  fetch(BACKEND + '/api/auth/session', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + accessToken
    },
    body: JSON.stringify({
      email: params['email'] || ''
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if(data.workspace) {
      localStorage.setItem('mt_workspace_id', data.workspace.id);
      localStorage.setItem('mt_workspace_name', data.workspace.name);
      localStorage.setItem('mt_user_email', data.user.email);
      localStorage.setItem('mt_user_name', data.user.name);
    }
    document.getElementById('msg').textContent = 'Signed in. Redirecting...';
    setTimeout(function(){ window.location.href = '/index.html'; }, 600);
  })
  .catch(function() {
    // Session call failed but we still have the token — redirect anyway
    document.getElementById('msg').textContent = 'Signed in. Redirecting...';
    setTimeout(function(){ window.location.href = '/index.html'; }, 600);
  });

} else if(errorDesc) {
  document.getElementById('msg').textContent = 'Error: ' + decodeURIComponent(errorDesc).replace(/\+/g,' ');
} else {
  document.getElementById('msg').textContent = 'No token found. Redirecting to login...';
  setTimeout(function(){ window.location.href = '/login.html'; }, 2000);
}
</script>
</body>
</html>
